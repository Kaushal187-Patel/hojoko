# Render Blueprint — HOZOKO (frontend + API)
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy, set secrets in the Render dashboard (not in this file).
# Connect your custom domain on each Web Service → Settings → Custom Domains.

services:
  - type: web
    name: hozoko-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  - type: web
    name: hozoko-web
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set these before first deploy (Blueprint will prompt). Required at build time for Next.js.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        value: rzp_test_placeholder
