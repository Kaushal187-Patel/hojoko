# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → Blueprints → New Blueprint Instance → connect this repo

services:
  # Express API (deploy backend first, then set CLIENT_URL after frontend is live)
  - type: web
    name: hozoko-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: hozoko-uploads
      mountPath: uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # Next.js storefront
  - type: web
    name: hozoko-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
