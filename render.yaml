# Render Blueprint — HOZOKO (https://render.com/docs/blueprint-spec)
#
# Deploy: Dashboard → New → Blueprint → connect this repo.
# After deploy, set sync: false secrets in each service (see envVars below).
#
# Link services:
#   CLIENT_URL = your storefront URL (e.g. https://hozoko-web.onrender.com)
#   NEXT_PUBLIC_API_URL = https://<api-service-host>/api
#   NEXT_PUBLIC_SITE_URL = same as CLIENT_URL

services:
  - type: web
    name: hozoko-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRE
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false

  - type: web
    name: hozoko-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
